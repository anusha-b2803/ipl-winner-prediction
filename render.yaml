services:
  # Monolith: API Backend + Static Frontend
  - type: web
    name: ipl-prophet-monolith
    env: docker
    dockerFilePath: ./Dockerfile
    healthCheckPath: /health
    disk:
      name: ipl-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 8000
      - key: SQLITE_DB_PATH
        value: /app/data/ipl_stats.db
      - key: QDRANT_PATH
        value: /app/data/vector_db_v3
      - key: GOOGLE_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: SCRAPER_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: SCRAPE_YEARS
        value: 2008-2026
